apiVersion: v1
kind: Service
metadata:
  name: airflow-api-server
  namespace: {{ include "poc-onprem.namespace" . }}
  labels:
    app: airflow-api-server
spec:
  type: ClusterIP
  ports:
  - port: 8080
    targetPort: 8080
    protocol: TCP
    name: http
  selector:
    app: airflow-api-server

