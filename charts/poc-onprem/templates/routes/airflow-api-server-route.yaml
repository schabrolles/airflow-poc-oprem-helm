apiVersion: route.openshift.io/v1
kind: Route
metadata:
  name: airflow-api-server
  namespace: {{ include "poc-onprem.namespace" . }}
  labels:
    app: airflow-api-server
spec:
  to:
    kind: Service
    name: airflow-api-server
    weight: 100
  port:
    targetPort: http
  tls:
    termination: edge
    insecureEdgeTerminationPolicy: Redirect
  wildcardPolicy: None

