apiVersion: route.openshift.io/v1
kind: Route
metadata:
  name: minio-console
  namespace: {{ include "poc-onprem.namespace" . }}
  labels:
    app: minio
spec:
  to:
    kind: Service
    name: minio
    weight: 100
  port:
    targetPort: console
  tls:
    termination: edge
    insecureEdgeTerminationPolicy: Redirect
  wildcardPolicy: None

