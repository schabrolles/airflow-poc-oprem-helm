apiVersion: v1
kind: ConfigMap
metadata:
  name: services-config
  namespace: {{ include "poc-onprem.namespace" . }}
  labels: {{- include "poc-onprem.labels" . | nindent 4 }}
data:
  # Database configuration
  DB_HOST: {{ .Values.servicesConfig.database.host | quote }}
  DB_NAME: {{ .Values.servicesConfig.database.name | quote }}
  DB_USER: {{ .Values.servicesConfig.database.user | quote }}
  DB_PASS: {{ .Values.servicesConfig.database.password | quote }}

  # Qdrant configuration
  QDRANT_HOST: {{ .Values.servicesConfig.qdrant.host | quote }}
  QDRANT_PORT: {{ .Values.servicesConfig.qdrant.port | quote }}

  # Ollama configuration
  OLLAMA_CHAT_MODEL: {{ .Values.servicesConfig.ollama.chatModel | quote }}
  OLLAMA_EMBEDDING_MODEL:
    {{ .Values.servicesConfig.ollama.embeddingModel | quote }}
  OLLAMA_EMBEDDING_URL:
    {{ .Values.servicesConfig.ollama.embeddingUrl | quote }}

  # Chat UI configuration
  CHAT_API_URL: {{ .Values.servicesConfig.chatApiUrl | quote }}

# Made with Bob
