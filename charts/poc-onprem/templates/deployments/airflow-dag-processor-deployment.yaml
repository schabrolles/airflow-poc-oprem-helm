apiVersion: apps/v1
kind: Deployment
metadata:
  name: airflow-dag-processor
  namespace: {{ include "poc-onprem.namespace" . }}
  labels:
    app: airflow-dag-processor
spec:
  replicas: 1
  selector:
    matchLabels:
      app: airflow-dag-processor
  template:
    metadata:
      labels:
        app: airflow-dag-processor
    spec:
      imagePullSecrets:
        - name: quay-pull-secret    
      serviceAccountName: poc-onprem-sa
      securityContext:
        fsGroup: 0      
      containers:
      - name: airflow-dag-processor      
        image: {{ .Values.global.imageRegistry }}/poc-onprem-airflow-dag-processor:latest
        command: ["/entrypoint", "dag-processor"]
        env:
        - name: AIRFLOW_UID
          value: "50000"
        - name: AIRFLOW__CORE__FERNET_KEY
          valueFrom:
            secretKeyRef:
              name: airflow-secrets
              key: fernet-key
        - name: AIRFLOW__CORE__INTERNAL_API_SECRET_KEY
          valueFrom:
            secretKeyRef:
              name: airflow-secrets
              key: internal-api-secret-key
        - name: AIRFLOW__API_AUTH__JWT_SECRET
          valueFrom:
            secretKeyRef:
              name: airflow-secrets
              key: jwt-secret
        envFrom:
        - configMapRef:
            name: airflow-config
        volumeMounts:
        # - name: dags
        #   mountPath: /opt/airflow/dags
        - name: logs
          mountPath: /opt/airflow/logs
      volumes:
      # - name: dags
      #   configMap:
      #     name: airflow-dags
      - name: logs
        persistentVolumeClaim:
          claimName: airflow-logs-pvc

