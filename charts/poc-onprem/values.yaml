#
# 3. Update image registry to your private registry
#
# 4. Review and adjust resource limits based on your workload
#
# 5. Ensure your cluster has a StorageClass that supports ReadWriteMany (RWX)
#    for Airflow logs (e.g., NFS, CephFS, GlusterFS)
#
# 6. Update servicesConfig.chatApiUrl after deployment with actual route URL

